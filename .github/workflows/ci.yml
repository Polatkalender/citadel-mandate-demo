name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build · lint · test · demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all
      - name: run the 5-scenario demo
        run: cargo run --quiet

  docker:
    name: docker build + run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t citadel-mandate-demo .
      - name: run the demo in the container
        run: docker run --rm citadel-mandate-demo
